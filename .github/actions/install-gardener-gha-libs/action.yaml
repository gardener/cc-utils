name: Install Gardener-GHA-Libs
description: |
  Install Python3 and gardener-gha-libs.

  Accepts an optional bundle-dir input pointing to a pre-populated bundle
  directory (as produced by bundle-gardener-gha-libs). When not given, the
  action checks for a _bundle/ directory next to itself (present on pinned
  branches) and falls back to cloning from github.com at runtime.

inputs:
  bundle-dir:
    type: string
    default: ''
    description: |
      Pre-populated bundle directory (as produced by bundle-gardener-gha-libs).
      When empty, the action auto-detects _bundle/ next to itself (pinned
      branches) and falls back to cloning at runtime.

runs:
  using: composite
  steps:
    - name: check-if-installed
      id: check
      shell: bash
      run: |
        if pip show gardener-gha-libs &>/dev/null; then
          echo "already-installed=true" >> ${GITHUB_OUTPUT}
        fi
    # on GHE runners Python may not be pre-installed; set it up unconditionally
    # so that pip is available for the bundle path as well as the fallback path.
    # this step is intentionally NOT removed on pinned branches.
    - name: setup-python
      if: ${{ ! steps.check.outputs.already-installed && github.server_url != 'https://github.com' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: install-from-bundle
      id: bundle
      if: ${{ ! steps.check.outputs.already-installed }}
      shell: bash
      run: |
        set -euo pipefail
        bundle_dir='${{ inputs.bundle-dir }}'
        [ -z "${bundle_dir}" ] && bundle_dir='${{ github.action_path }}/_bundle'
        if [ ! -d "${bundle_dir}" ]; then
          echo 'no-bundle=true' >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        pip install -q "${bundle_dir}"/*/
    # steps below are only reached when no bundle is available (master path);
    # on pinned branches they are removed by pin-actions-and-workflows.
    # cc-utils' own pipelines always reference this action from master, even
    # when running on non-master branches.
    # removed on pinned branches (github.com path)
    - uses: actions/checkout@v6
      if: ${{ ! steps.check.outputs.already-installed && steps.bundle.outputs.no-bundle == 'true' && github.server_url == 'https://github.com' }}
      with:
        repository: gardener/cc-utils
        path: cc-utils
    - name: install-prerequisites-on-ghe
      if: ${{ ! steps.check.outputs.already-installed && github.server_url != 'https://github.com' }}
      shell: bash
      run: |
        set -eu
        pip install -q setuptools certifi
        # import runner's trust-bundle (might differ from python's default bundle)
        ln -sf /etc/ssl/certs/ca-certificates.crt "$(python -m certifi)"
    # removed on pinned branches (GHE path)
    - name: checkout-fallback
      if: ${{ ! steps.check.outputs.already-installed && steps.bundle.outputs.no-bundle == 'true' && github.server_url != 'https://github.com' }}
      shell: bash
      run: |
        set -euo pipefail
        # fallback if running on GHE
        git clone https://github.com/gardener/cc-utils
    # removed on pinned branches
    - name: install-gardener-gha-libs
      if: ${{ ! steps.check.outputs.already-installed && steps.bundle.outputs.no-bundle == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        tmpdir="$(mktemp -d)"
        mv cc-utils "${tmpdir}"
        cc_utils="${tmpdir}/cc-utils"
        pip install -q setuptools
        version=$(CC_UTILS_ROOT="${cc_utils}" python3 "${{ github.action_path }}/normalise_version.py")
        cd "${cc_utils}"
        for setup_file in setup.gha.py setup.oci.py setup.ocm.py; do
          python3 "${cc_utils}/${setup_file}" bdist_wheel --dist-dir "${cc_utils}/dist"
        done
        pip install --find-links "${cc_utils}/dist" \
          "gardener-oci==${version}" \
          "gardener-ocm==${version}" \
          "gardener-gha-libs==${version}"
