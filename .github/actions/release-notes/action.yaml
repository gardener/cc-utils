name: release-notes
description: |
  retrieves release-notes following conventions from Gardener-Project

inputs:
  component-descriptor:
    description: |
      effective OCM component-descriptor. It is sufficient to pass a `base component-descriptor`,
      as output by `base-component-descriptor` workflow. Its version must be set to next planned
      version (e.g. `1.2.0-dev`, if greatest released version was `1.1.0`).
    required: true
  ocm-repositories:
    description: |
      a (commaseparated) list of ocm-repository-URLs where component-versions are to be looked up
      (order is honoured).

      Caveat: this action will only honour final versions. Hence, at least one ocm-repository
      containing final/release versions must be passed.

      If no ocm-repository is passed, this action will fallback to the current ocm-repository from
      passed ocm-component-descriptor (see caveat above).
  github-token:
    description: |
      the github-auth-token to use for authenticating against GitHub.
      Use `secrets.GITHUB_TOKEN`. If not passed-on via input, env-var GITHUB_TOKEN will be
      honoured
  include-subcomponent-release-notes:
    description: |
      if set to `true`, release-notes of subcomponents will be included in full-release-notes
    default: false
    type: boolean
  draft:
    type: boolean
    default: false
    description: |
      if true, will collect draft-release-notes
  release-notes-variants:
    required: true
    type: string
    description: |
      Used to create different subsets of release-notes.
      A variant configuration is provided as flat yaml object, whereas the toplevel attribute is
      considered the variant-name.
      For each variant, the filtered and rendered markdown is written to
      `/tmp/<variant-name>-release-notes.md`.

      Expected structure (see release workflow inputs for allowed values):
      ```
      my-variant:
        audiences: 'developer,operator'
        categories: 'bugfix,feature'
        recursion-depth: 0
      your-variant:
        audiences: 'operator'
        categories: 'feature'
        recursion-depth: -1
      ```

runs:
  using: composite
  steps:
    - name: install-gardener-gha-libs
      uses: gardener/cc-utils/.github/actions/install-gardener-gha-libs@master
    - name: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # release-notes code needs full commit-history and tags
        fetch-tags: 0
    - uses: gardener/cc-utils/.github/actions/setup-git-identity@master
    - name: authenticate-against-oci-registry
      uses: gardener/cc-utils/.github/actions/oci-auth@master
      with:
        oci-image-reference: ${{ inputs.ocm-repositories }} # only the first entry will be used
        gh-token: ${{ inputs.github-token }}
    - name: Retrieve Release-Notes
      id: release-notes
      shell: bash
      run: |
        set -eu

        cat <<EOF > component-descriptor.yaml
        ${{ inputs.component-descriptor }}
        EOF

        echo 'Component-Descriptor:'
        cat component-descriptor.yaml

        auth_token="${{ inputs.github-token }}"

        if [ -z "${auth_token:-}" ]; then
          auth_token="${GITHUB_TOKEN}"
        fi

        if [ "${{ inputs.draft }}" == 'true' ]; then
          draft_arg='--draft'
        fi

        if [ -n "${{ inputs.ocm-repositories }}" ]; then
          ocm_repositories_arg="--ocm-repositories ${{ inputs.ocm-repositories }}"
        fi

        if ! ${{ inputs.include-subcomponent-release-notes }}; then
          extra_args='--no-subcomponent-release-notes'
        fi

        echo 'Fetching release-notes'
        "${GITHUB_ACTION_PATH}/release_notes_cli.py" \
          --component-descriptor component-descriptor.yaml \
          --github-auth-token "${auth_token}" \
          ${draft_arg:-} \
          ${ocm_repositories_arg:-} \
          --local-release-notes release-notes.md \
          --tar-output /tmp/release-notes.tar ${extra_args:-}

        echo 'Local Release-notes written to `release-notes.md`'

        echo '## Release-Notes (local)' >> ${GITHUB_STEP_SUMMARY}
        cat release-notes.md >> ${GITHUB_STEP_SUMMARY}

    - uses: gardener/cc-utils/.github/actions/upload-artifact@master
      with:
        name: release-notes
        path: /tmp/release-notes.tar

    - uses: gardener/cc-utils/.github/actions/upload-artifact@master
      with:
        name: legacy-release-notes
        path: release-notes.md

    - name: prepare release-note variants
      shell: python
      run: |
        import tarfile

        import yaml

        import cnudie.iter
        import cnudie.retrieve
        import ocm
        import oci.auth
        import oci.client
        import release_notes.ocm as rno
        import release_notes.utils as rnu

        component_descriptor_content = '${{ inputs.component-descriptor }}\n'
        with open('/tmp/component-descriptor.yaml', 'w') as f:
          f.write(component_descriptor_content)

        component_descriptor = ocm.ComponentDescriptor.from_dict(
          yaml.safe_load(component_descriptor_content)
        )

        oci_client = oci.client.Client(
          credentials_lookup=oci.auth.docker_credentials_lookup(),
        )
        ocm_repositories = '${{ inputs.ocm-repositories }}'.split(',')
        ocm_repository_lookup = cnudie.retrieve.ocm_repository_lookup(*ocm_repositories)
        component_descriptor_lookup = cnudie.retrieve.create_default_component_descriptor_lookup(
            ocm_repository_lookup=ocm_repository_lookup,
            oci_client=oci_client,
        )

        release_notes_variant_cfg = '''\
        ${{ .inputs.release-notes-variants }}
        '''
        release_notes_variant_cfg = yaml.safe_load(release_notes_variant_cfg)

        release_notes_docs_dir = '/tmp/release-notes-dir'

        with tarfile.open('/tmp/release-notes.tar', 'r') as tar:
          tar.extractall(path=release_notes_docs_dir)

        all_release_notes_docs = rno.read_release_notes_from_dir(
          release_notes_docs_dir=release_notes_docs_dir,
        )

        for variant in ('github', 'slack'):
          filtered_release_notes_docs = []

          for cnode in cnudie.iter.iter(
            component=component_descriptor.component,
            lookup=component_descriptor_lookup,
            recursion_depth=release_notes_variant_cfg[variant]['recursion-depth'],
            node_filter=cnudie.iter.Filter.components,
          ):
            for rn in all_release_notes_docs:
              if rn.component_id == cnode.component_id:
                filtered_release_notes_docs.append(rn)

          release_notes_docs = [
            rnu.filter_release_notes(
              release_notes_doc=release_notes_doc,
              audiences=release_notes_variant_cfg[variant]['audiences'].split(','),
              categories=release_notes_variant_cfg[variant]['categories'].split(','),
            )
            for release_notes_doc in filtered_release_notes_docs
          ]

          release_notes_markdown = rno.release_notes_docs_as_markdown(
              release_notes_docs=release_notes_docs,
          )
          if not release_notes_markdown.endswith('\n')
            release_notes_markdown = f'{release_notes_markdown}\n'

          with open(f'/tmp/{variant}-release-notes.md', 'w') as f:
            f.write(release_notes_markdown)

    - uses: gardener/cc-utils/.github/actions/upload-artifact@master
      with:
        name: github-release-notes
        path: /tmp/github-release-notes.md

    - uses: gardener/cc-utils/.github/actions/upload-artifact@master
      with:
        name: slack-release-notes
        path: /tmp/slack-release-notes.md
