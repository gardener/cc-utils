name: Pin Actions and Workflows

on:
  workflow_dispatch:
    inputs:
      own-ref:
        type: string
        default: master
        description: |
          Ref (branch name or commit digest) to read from. Defaults to `master`.
      target-branch:
        type: string
        default: preview
        description: |
          Branch to push pinned commits to. Will be force-pushed. Defaults to `preview`.
  workflow_call:
    inputs:
      own-ref:
        type: string
        default: master
        description: |
          Ref (branch name or commit digest) to read from. Defaults to `master`.
      target-branch:
        type: string
        default: v1
        description: |
          Branch to push pinned commits to. Will be force-pushed. Defaults to `v1`.
      own-org:
        type: string
        default: ''
        description: |
          GitHub organisation owning this repository. Defaults to the calling
          repository's organisation.
      own-repo:
        type: string
        default: ''
        description: |
          GitHub repository name. Defaults to the calling repository's name.
      release-commit-objects-artefact:
        type: string
        default: ''
        description: |
          Optional name of an artifact produced by `capture-commit`. If set, the artifact
          is imported before pinning so the captured commit is reachable as `own-ref`.

jobs:
  pin:
    runs-on: ${{ vars.DEFAULT_RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write  # required to push the target branch and preservation refs
      id-token: write  # required for OIDC federated token exchange
    steps:
      - uses: gardener/cc-utils/.github/actions/trusted-checkout@c9d1d39f97def4dce35784bcfb2f092f564b48cf
        with:
          fetch-depth: 0  # full history required for git worktree operations
          token-server: ${{ vars.FEDERATED_GITHUB_ACCESS_TOKEN_SERVER }}
          init-git-identity: true
          github-auth-token-permissions: |
            contents: write
            workflows: write

      - name: pin-actions-and-workflows
        uses: gardener/cc-utils/.github/actions/pin-actions-and-workflows@96f4e61d727f340e5372607584c718515bcc5397
        with:
          own-ref: ${{ inputs.own-ref }}
          target-branch: ${{ inputs.target-branch }}
          own-org: ${{ inputs.own-org }}
          own-repo: ${{ inputs.own-repo }}
          release-commit-objects-artefact: ${{ inputs.release-commit-objects-artefact }}
