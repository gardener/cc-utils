name: Pull-Request-Trust Helper

# description: |
#   An opinionated re-usable workflow to help with trusting Pull-Requests. Depending on the
#   trustedness of a pullrequest's author, the workflow will either add an indication
#   that a label needs to be added, or automatically add a "trusted-label".
#
#   A user is considered trusted, if:
#     - he is member of the pullrequest-target-repository's organisation
#     - he is member of any of the `trusted-teams` (input to this workflow)
#     - his association w/ target-repository is any of:
#       - COLLABORATOR
#       - MEMBER
#       - OWNER
#
#   Note: This workflow is intended to only by triggered for the following actions for pull-requests:
#   - opened
#   - edited
#   - reopened
#   - synchronize
#
#   If triggered from other sources, the workflow will early-exit with a warning, and have no
#   effect.

on:
  workflow_call:
    inputs:
      trusted-label:
        description: |
          the label to set in order to trigger pipeline-runs trusting that label
          needs to exist for the target-repository
        type: string
        required: false
      trusted-teams:
        description: |
          an optional, comma-separated list of team-names. Members of any of those teams
          are considered to be trusted.
        type: string
        default: ''
      github-environment:
        required: false
        default: ""
        type: string
        description: |
          Optionally define github environment.
          By default no github environment is used.
      github-runs-on:
        required: false
        type: string
        description: |
          The runner to use for executing the workflow. If not set, default values are being used.

jobs:
  pullrequest-trust-helper:
    runs-on: ${{ inputs.github-runs-on || vars.DEFAULT_RUNNER || 'ubuntu-latest' }}
    permissions:
      id-token: write
    environment: ${{ inputs.github-environment }}
    steps:
      - uses: gardener/cc-utils/.github/actions/github-auth@9d2827d6e94583ec4e197d61d94f8f6b60aeede9
        if: ${{ vars.FEDERATED_GITHUB_ACCESS_TOKEN_SERVER != '' }}
        id: fed-token
        with:
          token-server: ${{ vars.FEDERATED_GITHUB_ACCESS_TOKEN_SERVER }}
          repositories: |
            ${{ github.event.repository.name }}
          permissions: |
            pull-requests: write
            members: read
      - uses: gardener/cc-utils/.github/actions/pullrequest-trust-helper@16fd2a2a46018e4179795ee2f974e2dcb45c6a81
        with:
          trusted-label: ${{ inputs.trusted-label || vars.DEFAULT_LABEL_OK_TO_TEST || 'ok-to-test' }}
          trusted-teams: ${{ inputs.trusted-teams }}
          github-token: ${{ steps.fed-token.outputs.token }}
